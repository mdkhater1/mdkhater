<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ContaKids • Zuzanna Matysiewicz</title>
  <meta name="description" content="ContaKids — playful movement practice for parents and children. Classes with Zuzanna Matysiewicz." />
  <meta property="og:title" content="ContaKids • Zuzanna Matysiewicz" />
  <meta property="og:description" content="Play, move, connect. Parent–child movement classes inspired by ContaKids." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://images.pexels.com/photos/2701585/pexels-photo-2701585.jpeg?auto=compress&cs=tinysrgb&w=1200" />
  <meta name="theme-color" content="#fff7fb" />

  <style>
    :root{
      --bg1:#fff7fb; --bg2:#fffceb;
      --panel:#ffffff; --panel2:#fff9fb;
      --text:#1f2937; --muted:#6b7280;
      --pink:#fb7185; --peach:#fdba74; --yellow:#facc15; --mint:#34d399; --sky:#38bdf8;
      --ring: rgba(251,113,133,.26);
      --shadow: 0 12px 30px rgba(17,24,39,.10);
      --radius: 16px; --radius2: 26px; --max: 1120px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:
        radial-gradient(900px 520px at 15% -10%, rgba(251,113,133,.18), transparent 60%),
        radial-gradient(900px 520px at 85% -10%, rgba(56,189,248,.18), transparent 60%),
        radial-gradient(1000px 700px at 50% 110%, rgba(250,204,21,.18), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:20px}
    .topbar{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,.80);
      border-bottom: 1px solid rgba(17,24,39,.07);
      box-shadow: 0 2px 10px rgba(17,24,39,.05);
    }
    .nav{
      max-width:var(--max); margin:0 auto;
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      padding:14px 20px;
    }
    .brand{display:flex; align-items:center; gap:12px; text-decoration:none;}
    .logo{
      width:44px; height:44px; border-radius:14px;
      background: radial-gradient(circle at 30% 30%, rgba(251,113,133,1), rgba(250,204,21,1));
      box-shadow: 0 8px 18px rgba(251,113,133,.22);
      position:relative;
    }
    .logo:after{
      content:""; position:absolute; inset:10px; border-radius:12px;
      background: radial-gradient(circle at 30% 30%, rgba(56,189,248,.9), rgba(52,211,153,.85));
      opacity:.9; mix-blend-mode: multiply;
    }
    .brand h1{margin:0; font-size:15px; font-weight:750; letter-spacing:.2px}
    .brand p{margin:0; font-size:12px; color:var(--muted)}
    .navlinks{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;}
    .chip{
      text-decoration:none;
      padding:9px 14px;
      border-radius:999px;
      background: rgba(17,24,39,.04);
      border:1px solid rgba(17,24,39,.06);
      font-size:13.5px;
      transition:.18s transform, .18s background, .18s border, .18s box-shadow;
      display:inline-flex; align-items:center; gap:8px;
      cursor:pointer; user-select:none; white-space:nowrap;
    }
    .chip:hover{transform:translateY(-1px); background: rgba(17,24,39,.06); border-color: rgba(251,113,133,.25)}
    .chip.active{
      background: rgba(251,113,133,.14);
      border-color: rgba(251,113,133,.30);
      box-shadow: 0 0 0 4px var(--ring);
    }
    .rightControls{display:flex; align-items:center; gap:10px}
    select, button{font:inherit; color:inherit}
    .select{
      background: rgba(17,24,39,.04);
      border:1px solid rgba(17,24,39,.09);
      border-radius:999px;
      padding:9px 12px;
      outline:none;
    }
    .btn{
      border:1px solid rgba(17,24,39,.10);
      border-radius:999px;
      padding:10px 14px;
      background: linear-gradient(135deg, rgba(250,204,21,.45), rgba(251,113,133,.35));
      cursor:pointer;
      transition:.18s transform, .18s border, .18s filter;
      box-shadow: 0 8px 16px rgba(251,113,133,.12);
    }
    .btn:hover{transform:translateY(-2px); border-color: rgba(251,113,133,.35); filter:saturate(1.05)}
    .btn.primary{
      color:#fff;
      background: linear-gradient(135deg, rgba(251,113,133,.95), rgba(250,204,21,.85));
      border-color: rgba(251,113,133,.40);
    }
    .hero{
      padding:28px 0 10px;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:22px;
      align-items:stretch;
    }
    @media (max-width: 920px){
      .hero{grid-template-columns:1fr}
      .nav{flex-wrap:wrap}
      .rightControls{width:100%; justify-content:flex-end}
    }
    .card{
      background: var(--panel);
      border:1px solid rgba(17,24,39,.07);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .pad{padding:22px}
    .headline{
      margin:0 0 12px;
      font-size:38px;
      line-height:1.05;
      letter-spacing:-.6px;
      font-weight:850;
    }
    .sub{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
      max-width: 72ch;
    }
    .kpis{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;}
    .kpi{
      padding:9px 12px;
      border-radius: 14px;
      background: var(--panel2);
      border:1px solid rgba(17,24,39,.06);
      font-size:13px;
      display:flex; align-items:center; gap:8px;
    }
    .dot{width:10px; height:10px; border-radius:999px; background: var(--mint); box-shadow: 0 0 0 4px rgba(52,211,153,.18);}
    .dot.pink{background:var(--pink); box-shadow: 0 0 0 4px rgba(251,113,133,.18)}
    .dot.sky{background:var(--sky); box-shadow: 0 0 0 4px rgba(56,189,248,.18)}
    .dot.yellow{background:var(--yellow); box-shadow: 0 0 0 4px rgba(250,204,21,.20)}
    .tagRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px}
    .tag{
      font-size:12px; padding:7px 10px; border-radius:999px;
      border:1px solid rgba(17,24,39,.08); background: rgba(17,24,39,.04);
    }
    .tag.good{border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.14)}
    .tag.warm{border-color: rgba(250,204,21,.40); background: rgba(250,204,21,.18)}
    .tag.rose{border-color: rgba(251,113,133,.35); background: rgba(251,113,133,.14)}
    .heroMedia{position:relative; min-height:290px}
    .heroMedia img{width:100%; height:100%; object-fit:cover; display:block; filter:saturate(1.03) contrast(1.02);}
    .badge{position:absolute; inset:auto 14px 14px 14px; display:flex; gap:10px; flex-wrap:wrap;}
    .pill{
      padding:7px 10px; border-radius:999px; font-size:12px;
      background: rgba(255,255,255,.82); border:1px solid rgba(17,24,39,.08);
      backdrop-filter: blur(8px);
    }
    .grid{
      display:grid; grid-template-columns: repeat(12, 1fr);
      gap: 16px; margin: 18px 0 40px;
    }
    .col-12{grid-column: span 12}
    .col-8{grid-column: span 8}
    .col-6{grid-column: span 6}
    .col-4{grid-column: span 4}
    @media (max-width: 920px){ .col-8,.col-6,.col-4{grid-column: span 12} }
    .sectionTitle{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin: 6px 0 10px;}
    .sectionTitle h2{margin:0; font-size:18px; font-weight:800; letter-spacing:.2px}
    .sectionTitle p{margin:0; font-size:13px; color:var(--muted)}
    .list{display:grid; gap:12px; margin-top:10px}
    .item{
      padding:16px 16px; border-radius: var(--radius);
      background: var(--panel2); border:1px solid rgba(17,24,39,.06);
    }
    .item b{display:block; margin-bottom:6px; font-weight:800}
    .item p{margin:0; color:var(--muted); line-height:1.6; font-size:14px}
    .gallery{
      display:grid; grid-template-columns: repeat(12, 1fr);
      gap:12px; margin-top: 12px;
    }
    .g{
      grid-column: span 4; border-radius: 18px; overflow:hidden;
      border:1px solid rgba(17,24,39,.08);
      cursor:pointer; background: var(--panel2);
      min-height: 190px;
      box-shadow: 0 10px 18px rgba(17,24,39,.06);
      transition:.18s transform, .18s box-shadow;
    }
    .g:hover{transform:translateY(-2px); box-shadow: 0 16px 26px rgba(17,24,39,.08)}
    .g img{width:100%; height:100%; object-fit:cover; display:block}
    @media (max-width: 920px){ .g{grid-column: span 6} }
    @media (max-width: 520px){ .g{grid-column: span 12} }
    .faq details{
      background: var(--panel2);
      border:1px solid rgba(17,24,39,.06);
      border-radius: 16px;
      padding: 12px 14px;
    }
    .faq summary{cursor:pointer; font-weight:800}
    .faq p{margin:10px 0 0; color:var(--muted); line-height:1.65; font-size:14px}
    footer{
      padding: 26px 0 50px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid rgba(17,24,39,.06);
    }
    .backdrop{
      position:fixed; inset:0;
      background: rgba(17,24,39,.45);
      display:none; align-items:flex-end; justify-content:center;
      z-index:100;
    }
    .backdrop.open{display:flex}
    .modal{
      width: min(980px, 96vw);
      border-radius: 22px 22px 0 0;
      background: var(--panel);
      border:1px solid rgba(17,24,39,.08);
      box-shadow: var(--shadow);
      overflow:hidden;
      max-height: 86vh;
      display:flex; flex-direction:column;
    }
    .modalHeader{
      padding: 14px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid rgba(17,24,39,.07);
      background: linear-gradient(135deg, rgba(251,113,133,.08), rgba(250,204,21,.08));
    }
    .modalHeader b{font-size:15px; font-weight:900}
    .modalBody{padding: 16px; overflow:auto}
    .x{
      border:1px solid rgba(17,24,39,.10);
      background: rgba(17,24,39,.04);
      border-radius: 12px;
      padding: 8px 10px;
      cursor:pointer;
    }
    .form{display:grid; gap:12px}
    .row{display:grid; grid-template-columns: 1fr 1fr; gap:12px}
    @media (max-width: 700px){
      .row{grid-template-columns:1fr}
      .backdrop{align-items:stretch}
      .modal{border-radius:0}
    }
    input, textarea{
      width:100%;
      border-radius: 14px;
      padding: 12px 12px;
      border:1px solid rgba(17,24,39,.12);
      background: var(--panel2);
      color: var(--text);
      outline:none;
    }
    input:focus, textarea:focus{box-shadow: 0 0 0 4px var(--ring); border-color: rgba(251,113,133,.40);}
    textarea{min-height: 120px; resize: vertical}
    .helper{font-size:12px; color:var(--muted); line-height:1.5}
    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    .btnGhost{
      background: rgba(17,24,39,.04);
      border:1px solid rgba(17,24,39,.10);
      border-radius:999px;
      padding:10px 12px;
      cursor:pointer;
    }
    .lightbox{
      position:fixed; inset:0;
      display:none; place-items:center;
      background: rgba(17,24,39,.72);
      z-index:110; padding: 18px;
    }
    .lightbox.open{display:grid}
    .lightbox figure{
      margin:0;
      max-width: min(1100px, 96vw);
      max-height: 86vh;
      background: var(--panel);
      border:1px solid rgba(17,24,39,.12);
      border-radius: 18px;
      overflow:hidden;
      box-shadow: var(--shadow);
    }
    .lightbox img{
      width:100%; height:auto; max-height: 72vh;
      display:block; object-fit:contain; background:#fff;
    }
    .lightbox figcaption{
      padding: 10px 12px;
      font-size: 13px; color: var(--muted);
      display:flex; justify-content:space-between; gap:10px; align-items:center;
    }
    .lbNav{display:flex; gap:8px}
    .lbBtn{
      background: rgba(17,24,39,.04);
      border:1px solid rgba(17,24,39,.12);
      border-radius: 12px;
      padding: 7px 10px;
      cursor:pointer;
    }
    body.rtl{direction:rtl}
    body.rtl .nav{flex-direction:row-reverse}
    body.rtl .navlinks{justify-content:flex-start}
    body.rtl .sectionTitle{flex-direction:row-reverse}
    body.rtl .badge{justify-content:flex-end}
  
    /* Admin panel */
    .adminWrap{display:grid; gap:14px}
    .adminTop{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap}
    .adminCard{background: var(--panel); border:1px solid rgba(17,24,39,.08); border-radius: 18px; box-shadow: var(--shadow); overflow:hidden}
    .adminCard .pad{padding:18px}
    .adminGrid{display:grid; grid-template-columns: repeat(12, 1fr); gap:12px}
    .adminCol6{grid-column: span 6}
    .adminCol12{grid-column: span 12}
    @media (max-width: 920px){ .adminCol6{grid-column: span 12} }
    .label{font-size:12px; color:var(--muted); margin:0 0 6px}
    .rowBtns{display:flex; gap:10px; flex-wrap:wrap}
    .mini{font-size:12px; padding:8px 10px}
    .warn{background: rgba(250,204,21,.18); border-color: rgba(250,204,21,.40)}
    .danger{background: rgba(251,113,133,.14); border-color: rgba(251,113,133,.35)}
    .adminTable{width:100%; border-collapse:separate; border-spacing:0 8px}
    .adminTable td{background: var(--panel2); border:1px solid rgba(17,24,39,.08); padding:10px; border-radius: 14px; vertical-align:top}
    .adminTable input{background: #fff}

  </style>
</head>

  let currentLang = "en";
  function t(key, fallback){
    const dict = I18N[currentLang] || I18N.en;
    const val = dict[key];
    return (val === undefined) ? (fallback ?? key) : val;
  }
  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch])); }
  function escapeAttr(s){ return escapeHTML(s).replace(/`/g,"&#96;"); }

  // ------------------------------
  // Admin + Settings (localStorage)
  // ------------------------------
  const ADMIN_USER = "Safwat";
  const ADMIN_DEFAULT_PASS = "27824@MZ";
  const LS_ADMIN_HASH = "ck_admin_hash_v1";
  const LS_ADMIN_SESSION = "ck_admin_session_v1";
  const LS_SETTINGS = "ck_site_settings_v1";

  async function sha256(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  async function ensureAdminHash(){
    const existing = localStorage.getItem(LS_ADMIN_HASH);
    if(existing) return existing;
    const h = await sha256(ADMIN_USER + ":" + ADMIN_DEFAULT_PASS);
    localStorage.setItem(LS_ADMIN_HASH, h);
    return h;
  }
  function isAdminAuthed(){ return localStorage.getItem(LS_ADMIN_SESSION) === "1"; }
  function setAdminAuthed(v){ localStorage.setItem(LS_ADMIN_SESSION, v ? "1" : "0"); }

  const DEFAULT_SETTINGS = {
    theme: {
      bg1: "#fff7fb", bg2:"#fffceb",
      pink:"#fb7185", peach:"#fdba74", yellow:"#facc15", mint:"#34d399", sky:"#38bdf8",

    },
    media: { heroImage: "" },
    sections: { home:true, about:true, zuzanna:true, classes:true, gallery:true, faq:true, contact:true },

    ],

  };

  function getDefaultSettings(){
    const s = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    s.media.heroImage = CONFIG.heroImage;
    s.contactEmail = CONFIG.contactEmail;
    s.gallery = CONFIG.gallery.map(x=>({...x}));
    // keep extra editable parts
    return s;
  }
  function loadSettings(){
    try{
      const raw = localStorage.getItem(LS_SETTINGS);
      if(!raw) return getDefaultSettings();
      const obj = JSON.parse(raw);
      const base = getDefaultSettings();
      return {
        ...base, ...obj,
        theme: {...base.theme, ...(obj.theme||{})},
        typography: {...base.typography, ...(obj.typography||{})},
        media: {...base.media, ...(obj.media||{})},
        sections: {...base.sections, ...(obj.sections||{})},
        gallery: Array.isArray(obj.gallery) ? obj.gallery : base.gallery
      };
    }catch{ return getDefaultSettings(); }
  }
  function saveSettings(s){ localStorage.setItem(LS_SETTINGS, JSON.stringify(s)); }

  function applySettings(s){
    const r = document.documentElement.style;
    Object.entries(s.theme||{}).forEach(([k,v])=>{
      if(k==="radius" || k==="radius2") r.setProperty("--"+k, v+"px");
      else r.setProperty("--"+k, v);
    });
    document.body.style.fontFamily = (s.typography && s.typography.fontFamily) || DEFAULT_SETTINGS.typography.fontFamily;
    document.body.style.fontSize = ((s.typography && s.typography.baseFontSize) || 16) + "px";
    let st = document.getElementById("dynHeadSize");
    if(!st){ st = document.createElement("style"); st.id="dynHeadSize"; document.head.appendChild(st); }
    st.textContent = `.headline{font-size:${(s.typography && s.typography.headlineSize) || 38}px}`;

    // Apply media + email + gallery back into CONFIG
    if(s.media && s.media.heroImage) CONFIG.heroImage = s.media.heroImage;
    if(s.contactEmail) CONFIG.contactEmail = s.contactEmail;
    if(Array.isArray(s.gallery) && s.gallery.length) CONFIG.gallery = s.gallery;
  }


  function renderInstaThumbs(){
    const grid = document.getElementById("instaThumbs");
    if(!grid) return;
    const s = window.__settings || {};
    const items = Array.isArray(s.instaThumbs) ? s.instaThumbs : [];
    if(!items.length){ grid.innerHTML = ""; return; }
    grid.innerHTML = items.map(it => `
      <a class="gItem" href="${escapeAttr(it.url||CONFIG.instagramLink)}" target="_blank" rel="noreferrer" style="text-decoration:none">
        <img src="${escapeAttr(it.img||"")}" alt="" loading="lazy"/>
        <div class="gCap">${escapeHTML((LANG==="ar"? it.cap_ar : LANG==="pl"? it.cap_pl : it.cap_en) || "")}</div>
      </a>

  function adminImport(){
    const inp = document.createElement("input");
    inp.type="file"; inp.accept="application/json";
    inp.onchange = async ()=>{
      const f = inp.files && inp.files[0];
      if(!f) return;
      try{
        const obj = JSON.parse(await f.text());
        const base = getDefaultSettings();
        const merged = {
          ...base, ...obj,
          theme:{...base.theme, ...(obj.theme||{})},
          typography:{...base.typography, ...(obj.typography||{})},
          media:{...base.media, ...(obj.media||{})},
          sections:{...base.sections, ...(obj.sections||{})},
          gallery: Array.isArray(obj.gallery) ? obj.gallery : base.gallery
        };
        window.__settings = merged;
        saveSettings(window.__settings);
        applySettings(window.__settings);
        renderNav(); render();
        const st = document.getElementById("ad_status");
        if(st) st.textContent = t("adminImported");
      }catch{ alert(t("adminInvalidJSON")); }
    };
    inp.click();
  }

  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalClose = document.getElementById("modalClose");
  const bookNow = document.getElementById("bookNow");

  function openBooking(){
    document.getElementById("t_modalTitle").textContent = t("modalTitle");
    document.getElementById("t_modalHelper").textContent = t("modalHelper");
    document.getElementById("t_modalNote").textContent = t("modalNote");
    document.getElementById("sendMail").textContent = t("sendEmail");
    document.getElementById("copyMsg").textContent = t("copyMsg");

    modalBackdrop.classList.add("open");
    document.getElementById("f_subject").value = document.getElementById("f_subject").value || "ContaKids – Booking / Question";

    const defaultMsg =
      (currentLang === "ar") ? (
        "مرحباً زوزانا،\nأود الاستفسار/الحجز لحصة كونتاكيدز.\nعمر الطفل: \nالمدينة/الحي: \nالأيام المناسبة: \nعدد المشاركين: \nشكراً!"
      ) : (currentLang === "pl") ? (
        "Cześć Zuzanna,\nChciał(a)bym zapytać / zapisać się na ContaKids.\nWiek dziecka: \nMiasto/dzielnica: \nPreferowane dni: \nLiczba uczestników: \nDziękuję!"
      ) : (
        "Hi Zuzanna,\nI’d like to ask / book a ContaKids class.\nChild age: \nCity/area: \nPreferred days: \nNumber of participants: \nThank you!"
      );

    document.getElementById("f_msg").value = document.getElementById("f_msg").value || defaultMsg;
    setTimeout(()=>document.getElementById("f_name").focus(), 50);
  }
  function closeBooking(){ modalBackdrop.classList.remove("open"); }
  bookNow.addEventListener("click", openBooking);
  modalClose.addEventListener("click", closeBooking);
  modalBackdrop.addEventListener("click", (e)=>{ if(e.target === modalBackdrop) closeBooking(); });
  window.openBooking = openBooking;

  document.getElementById("sendMail").addEventListener("click", () => {
    const name = document.getElementById("f_name").value.trim();
    const email = document.getElementById("f_email").value.trim();
    const city = document.getElementById("f_city").value.trim();
    const age  = document.getElementById("f_age").value.trim();
    const subject = document.getElementById("f_subject").value.trim() || "ContaKids – Booking / Question";
    const msg = document.getElementById("f_msg").value.trim();

    const lines = [
      name ? (currentLang==="ar" ? `الاسم: ${name}` : currentLang==="pl" ? `Imię: ${name}` : `Name: ${name}`) : "",
      email ? (currentLang==="ar" ? `البريد: ${email}` : currentLang==="pl" ? `E-mail: ${email}` : `Email: ${email}`) : "",
      city ? (currentLang==="ar" ? `المدينة: ${city}` : currentLang==="pl" ? `Miasto: ${city}` : `City: ${city}`) : "",
      age  ? (currentLang==="ar" ? `عمر الطفل: ${age}` : currentLang==="pl" ? `Wiek dziecka: ${age}` : `Child age: ${age}`) : "",
      "",
      msg
    ].filter(Boolean).join("\n");

    const mailto = `mailto:${encodeURIComponent(CONFIG.contactEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines)}`;
    window.location.href = mailto;
  });

  document.getElementById("copyMsg").addEventListener("click", async () => {
    const subject = document.getElementById("f_subject").value.trim() || "ContaKids – Booking / Question";
    const msg = document.getElementById("f_msg").value.trim();
    const text = `${subject}\n\n${msg}`;
    try{ await navigator.clipboard.writeText(text); alert(t("copied")); }
    catch{ alert(t("copyFail")); }
  });

  const lightbox = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbCap = document.getElementById("lbCap");
  let lbIndex = 0;

  function openLightbox(i){
    lbIndex = i;
    const g = CONFIG.gallery[lbIndex];
    lbImg.src = g.src;
    const cap = galleryCaption(g);
    lbImg.alt = cap;
    lbCap.textContent = cap;
    lightbox.classList.add("open");
  }
  function closeLightbox(){ lightbox.classList.remove("open"); }
  function nextLb(){ openLightbox((lbIndex+1) % CONFIG.gallery.length); }
  function prevLb(){ openLightbox((lbIndex-1+CONFIG.gallery.length) % CONFIG.gallery.length); }

  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  document.getElementById("lbNext").addEventListener("click", nextLb);
  document.getElementById("lbPrev").addEventListener("click", prevLb);
  lightbox.addEventListener("click", (e)=>{ if(e.target === lightbox) closeLightbox(); });
  window.openLightbox = openLightbox;

  window.addEventListener("keydown", (e)=>{
    if(modalBackdrop.classList.contains("open") && e.key==="Escape") closeBooking();
    if(lightbox.classList.contains("open")){
      if(e.key==="Escape") closeLightbox();
      if(e.key==="ArrowRight") nextLb();
      if(e.key==="ArrowLeft") prevLb();
    }
  });

  document.getElementById("lang").addEventListener("change", (e)=>setLang(e.target.value));
  window.addEventListener("hashchange", ()=>{ renderNav(); render(); });

  window.__settings = loadSettings();
  applySettings(window.__settings);
  ensureAdminHash();
  if(!location.hash) location.hash = "#/home";
  setLang("en"); renderNav(); render();
</script>
